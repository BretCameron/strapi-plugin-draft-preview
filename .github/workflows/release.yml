name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      # npm 11.5+ auto-detects GitHub Actions OIDC and exchanges it for a
      # short-lived publish token. Required for npm Trusted Publishing.
      # Install to a separate prefix to dodge the in-place self-upgrade bug
      # where the running npm can't find its own internal modules after
      # rewriting them.
      - name: Install recent npm to a separate prefix
        run: |
          npm install -g --prefix "$HOME/.local" npm@11.13.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/npm" --version

      - run: npm ci

      - run: npm run build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: npm run release
          version: npm run version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — Trusted Publisher (OIDC) configured on npm.
          NPM_CONFIG_PROVENANCE: "true"
